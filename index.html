<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pênaltis Matemáticos</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#1e7f35;
color:white;
}

button{
padding:15px 30px;
font-size:20px;
margin-top:20px;
cursor:pointer;
}

#gol{
font-size:40px;
margin-top:20px;
}
</style>
</head>

<body>

<h1>⚽ Pênaltis Matemáticos</h1>

<p>Resolva a conta para fazer o gol</p>

<h2 id="pergunta">3/4 + 1/4 = ?</h2>

<button onclick="gol()">1</button>
<button onclick="erro()">2</button>
<button onclick="erro()">3</button>

<div id="gol"></div>

<script>

function gol(){
document.getElementById("gol").innerHTML="GOOOOL ⚽";
}

function erro(){
document.getElementById("gol").innerHTML="DEFESA DO GOLEIRO 🧤";
}

</script>

</body>
</html>
